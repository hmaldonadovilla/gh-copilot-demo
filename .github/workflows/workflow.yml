# GitHub Action workflow that runs on push to main branch
# Docker build and push the album-api image to ACR
name: Build and Push Docker Image
on:
  push:
    branches:
      - main
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1
      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v2
        with:
          context: .
          push: true
# tag the image with the GitHub run id and push to docker hub
          tags: ${{ secrets.ACR_LOGIN_SERVER }}/album-api:${{ github.run_id }}
          build-args: |
            ACR_LOGIN_SERVER=${{ secrets.ACR_LOGIN_SERVER }}
            ACR_USERNAME=${{ secrets.ACR_USERNAME }}
            ACR_PASSWORD=${{ secrets.ACR_PASSWORD }}
# run tests on the album-api image
      - name: Run tests on Docker image
        run: |
          docker run --rm ${{ secrets.ACR_LOGIN_SERVER }}/album-api:${{ github.run_id }} npm test
# deploy the album-api image to the dev AKS cluster
      - name: Deploy to AKS
        uses: azure/aks-set-context@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}
          resource-group: ${{ secrets.AKS_RESOURCE_GROUP }}
      - name: Update Kubernetes deployment
        run: |
            kubectl set image deployment/album-api album-api=${{ secrets.ACR_LOGIN_SERVER }}/album-api:${{ github.run_id }} --record

